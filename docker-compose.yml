version: '3.1'

services:

  chat-slayer-backend:
    image: "chat-slayer-backend"
    container_name: "chat-slayer-backend"
    hostname: "chat-slayer-backend"
    restart: "unless-stopped"
    build: .
    environment:
      BACKEND_LOG_LEVEL: "DEBUG"
      BACKEND_PUBLIC_URL: "http://localhost:8008"
      BACKEND_INITIAL_USERS: "${BACKEND_INITIAL_USERS:-}"
      BACKEND_EMAIL_CONFIG: "smtp://localhost:25"
      BACKEND_JWT_SECRET: "${BACKEND_JWT_SECRET:?Set BACKEND_JWT_SECRET in your environment or .env}"
      FEDERATION_ENABLED: "false"
    ports:
      - "8008:8008"
